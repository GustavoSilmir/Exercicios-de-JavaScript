<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 20pt Arial;;
        }
    </style>
</head>
<body>
    <script>
        var nome = prompt('Qual o seu nome?')
        document.writeln(`Olá, ${nome} Seu nome temm ${nome.length} letras.<br/>`)
        document.writeln(`Seu nome em maiuscúla é ${nome.toLocaleUpperCase()}`)
        document.writeln(`Seu nome em minuscúla é ${nome.toLocaleLowerCase()}`)
    </script>
</body>
</html>
