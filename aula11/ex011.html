<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
</head>
<body>
    <h1>Nacionalidade</h1>
    País<input type="text" name="txtpais" id="txtpais">
    <input type="button" value="verificar" onclick="nacionalidade()">
    <div id="res">

    </div>
    <script>
        function nacionalidade(){
        var valtxt = window.document.getElementById('txtpais')
        var res = window.document.getElementById('res')
        var valorrealdotexto = String(valtxt.value)
        res.innerHTML = `<p>Você vive em ${valorrealdotexto}</p>`
        
        if (valorrealdotexto == 'brasil'){
            res.innerHTML += `Você é Brasileiro`
        }else{
            res.innerHTML += `Você é estrangeiro, suma daqui!`
        }
    }
        
    </script>
</body>
</html>
